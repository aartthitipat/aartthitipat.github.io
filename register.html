<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CheckGroup — สมัครสมาชิก</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="auth-bg"></div>

  <main class="auth-page">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">✅</div>
        <div class="auth-logo-text">Check<span>Group</span></div>
      </div>

      <h2 style="margin-bottom: 6px;">สร้างบัญชีใหม่</h2>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 28px;">
        เริ่มสร้าง Checklist ร่วมกับเพื่อนได้เลย!
      </p>

      <!-- Form -->
      <div class="auth-form">
        <!-- Username -->
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" placeholder="ชื่อผู้ใช้ (ภาษาอังกฤษ)"
            autocomplete="username" maxlength="30" />
          <span class="form-error" id="usernameError" style="display:none;"></span>
          <span class="form-hint">3–30 ตัวอักษร ตัวเลข หรือ _ เท่านั้น</span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" placeholder="example@email.com" autocomplete="email" />
          <span class="form-error" id="emailError" style="display:none;"></span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">รหัสผ่าน</label>
          <input class="form-input" type="password" id="password" placeholder="อย่างน้อย 6 ตัวอักษร"
            autocomplete="new-password" />
          <span class="form-error" id="passwordError" style="display:none;"></span>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="form-label" for="confirmPassword">ยืนยันรหัสผ่าน</label>
          <input class="form-input" type="password" id="confirmPassword" placeholder="กรอกรหัสผ่านอีกครั้ง"
            autocomplete="new-password" />
          <span class="form-error" id="confirmError" style="display:none;"></span>
        </div>

        <!-- General error -->
        <div id="registerError" class="form-error"
          style="display:none; padding: 10px; background: var(--danger-dim); border-radius: 8px; border: 1px solid rgba(240,82,82,0.2);">
        </div>

        <button class="btn btn--primary btn--full btn--lg" id="registerBtn" onclick="handleRegister()">
          สมัครสมาชิก
        </button>
      </div>

      <!-- Footer -->
      <div class="auth-footer">
        มีบัญชีแล้ว?
        <a href="index.html">เข้าสู่ระบบ →</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script>
    Auth.redirectIfLoggedIn();

    // Enter key navigation
    ['username', 'email', 'password', 'confirmPassword'].forEach((id, i, arr) => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const next = arr[i + 1];
          if (next) document.getElementById(next).focus();
          else handleRegister();
        }
      });
    });

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = msg ? 'flex' : 'none';
      const inputId = id.replace('Error', '');
      const input = document.getElementById(inputId);
      if (input) input.classList[msg ? 'add' : 'remove']('form-input--error');
    }

    async function handleRegister() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('registerBtn');
      const generalError = document.getElementById('registerError');

      // ล้าง errors
      ['username', 'email', 'password', 'confirm'].forEach(id => showError(id + 'Error', ''));
      generalError.style.display = 'none';

      let valid = true;

      // Username validation
      if (!username) {
        showError('usernameError', 'กรุณากรอก username'); valid = false;
      } else if (username.length < 3) {
        showError('usernameError', 'Username ต้องมีอย่างน้อย 3 ตัวอักษร'); valid = false;
      } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        showError('usernameError', 'ใช้ได้แค่ ตัวอักษร ตัวเลข หรือ _'); valid = false;
      }

      // Email validation
      if (!email) {
        showError('emailError', 'กรุณากรอก email'); valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('emailError', 'รูปแบบ email ไม่ถูกต้อง'); valid = false;
      }

      // Password validation
      if (!password) {
        showError('passwordError', 'กรุณากรอกรหัสผ่าน'); valid = false;
      } else if (password.length < 6) {
        showError('passwordError', 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'); valid = false;
      }

      // Confirm password
      if (password && password !== confirmPassword) {
        showError('confirmError', 'รหัสผ่านไม่ตรงกัน'); valid = false;
      }

      if (!valid) return;

      btn.disabled = true;
      btn.textContent = 'กำลังสร้างบัญชี...';

      const result = await DB.createUser({ username, email, password });

      if (result.success) {
        // Auto login หลังสมัคร
        await DB.login(username, password);
        btn.textContent = '✓ สมัครสำเร็จ! กำลังพาไป...';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 700);
      } else {
        generalError.innerHTML = '⚠️ ' + result.error;
        generalError.style.display = 'flex';
        btn.disabled = false;
        btn.textContent = 'สมัครสมาชิก';
      }
    }
  </script>
</body>

</html>
